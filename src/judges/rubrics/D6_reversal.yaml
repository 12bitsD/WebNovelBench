dimension:
  id: "D6"
  name: "颠覆与反转"
  name_en: "Reversal & Subversion"
  definition: |
    反转不是"意想不到"——那太容易了（"突然天降陨石"也意想不到）。
    反转 = 意料之外 + 情理之中 + 改变了理解。
    
    反转的三个层次：
      Level 1: 事件反转（发生了意想不到的事）
      Level 2: 认知反转（读者对某个人/事的理解被改变）
      Level 3: 框架反转（读者对整个故事的理解被推翻）

sampling:
  strategy: "key_nodes"
  chunk_size: 3000

scoring:
  "1-2":
    label: "无反转/完全可预测"
    characteristics:
      - "读者从第一章就知道结局"
      - "没有任何'意料之外'的时刻"
    counter_examples:
      - "有反转但依赖信息隐瞒 → 应评3-4分"
  "3-4":
    label: "有反转但依赖信息隐瞒"
    characteristics:
      - "反转是通过'隐藏信息'实现的（作者没告诉你关键信息）"
      - "反转后回看，前面的伏笔不够充分"
      - "典型表现：'原来他一直在暗中观察'——但前文没有暗示"
    counter_examples:
      - "反转有伏笔支撑 → 应评5-6分"
  "5-6":
    label: "反转有伏笔支撑"
    characteristics:
      - "反转有伏笔，回看时能理解"
      - "反转是'合理的意外'"
      - "但反转没有改变对整个故事的理解"
    counter_examples:
      - "反转改变了理解框架 → 应评7-8分"
  "7-8":
    label: "反转改变了理解框架"
    characteristics:
      - "反转迫使读者重新理解之前的内容"
      - "反转不是单一事件，而是整个视角的转变"
      - "典型表现：死亡笔记L的死亡（改变了整个故事的走向）"
    counter_examples:
      - "反转是叙事的核心驱动力 → 应评9-10分"
  "9-10":
    label: "反转是叙事的核心驱动力"
    characteristics:
      - "反转本身就是故事的核心机制"
      - "每次反转都深化了主题"
      - "典型表现：进击的巨人马莱篇、道诡异仙"
    counter_examples:
      - "如果反转只是'意想不到'但不深化主题 → 最高7-8分"

borderline_rules:
  - question: "反转很意外但不合理，怎么评？"
    answer: |
      "意料之外"只是反转的一半。"情理之中"同样重要。
      如果反转意外但不合理（没有伏笔支撑）→ 3-4分。
      如果反转意外且合理（有伏笔支撑）→ 5-6分以上。
  - question: "多个反转质量不一致？"
    answer: |
      取最重要的反转评估。如果最重要的反转是7-8分级别 → 整体7-8分。
      如果最好的反转只有5-6分 → 整体5-6分。

positive_examples:
  - work: "进击的巨人"
    score: 9
    reason: |
      马莱篇的视角反转是叙事级别的——读者发现自己一直在"敌方视角"。
      这个反转深化了"自由的代价"主题。
  - work: "道诡异仙"
    score: 9
    reason: |
      "现实"本身被质疑——读者发现整个故事可能只是另一层幻觉。
      这是框架级别的反转。

negative_examples:
  - work: "典型爽文"
    score: 2
    reason: |
      反转是套路化的（"原来他是隐藏身份的大佬"）。
      没有伏笔支撑，只是信息隐瞒。

judge_prompt_addition: |
  特别注意以下几点：
  1. "意外"不等于"好"——必须同时"合理"
  2. 框架反转（整个理解被推翻）是9-10分的核心标准
  3. 套路化的反转（隐藏身份、突然变强）不是真正的反转
  4. 反转是否深化主题是区分7-8和9-10的关键