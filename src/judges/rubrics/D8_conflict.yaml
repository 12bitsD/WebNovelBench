dimension:
  id: D8
  name: 冲突设计
  name_en: Conflict Design
  definition: '冲突不是''打架''——冲突是''两个不可调和的力量碰撞''。

    冲突四个层次：内在冲突、人际冲突、社会冲突、宇宙冲突。'
sampling:
  strategy: continuous
  start_pct: 0.4
  num_chapters: 5
  chunk_size: 3000
scoring:
  1-2:
    label: 无实质冲突/纯力量碾压
    characteristics:
    - 冲突只是'打一架'
    - 主角靠力量/运气赢
  3-4:
    label: 有基本冲突但缺乏层次
    characteristics:
    - 冲突主要在'人际'层面
    - 反派动机简单
  5-6:
    label: 冲突有层次和策略
    characteristics:
    - 至少两个层次的冲突同时存在
    - 冲突解决需要策略
  7-8:
    label: 冲突多元且深刻
    characteristics:
    - 四个层次的冲突都有涉及
    - 冲突解决揭示新信息或深化主题
  9-10:
    label: 冲突是叙事的核心引擎
    characteristics:
    - 冲突推动角色成长和主题深化
    - 冲突解决方式意料之外情理之中
