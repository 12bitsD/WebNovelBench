dimension:
  id: "D8"
  name: "冲突设计"
  name_en: "Conflict Design"
  definition: |
    冲突不是"打架"——冲突是"两个不可调和的力量碰撞"。
    好的冲突：有策略性、有多层次、有真正的代价。
    烂的冲突：纯力量碾压，无策略，无代价。
    
    冲突的四个层次：
      内在冲突：角色与自己的信念/欲望的斗争
      人际冲突：角色之间的利益/理念冲突
      社会冲突：角色与体制/文化的冲突
      宇宙冲突：角色与命运/自然/超自然的冲突

sampling:
  strategy: "continuous"
  start_pct: 0.4
  num_chapters: 5
  chunk_size: 3000

scoring:
  "1-2":
    label: "无实质冲突/纯力量碾压"
    characteristics:
      - "冲突只是'打一架'"
      - "主角靠力量/运气赢"
      - "没有策略，没有代价"
    counter_examples:
      - "有基本冲突但缺乏层次 → 应评3-4分"
  "3-4":
    label: "有基本冲突但缺乏层次"
    characteristics:
      - "冲突主要在'人际'层面"
      - "反派动机简单（'就是坏'）"
      - "冲突的解决是'主角更强'"
    counter_examples:
      - "至少两个层次的冲突同时存在 → 应评5-6分"
  "5-6":
    label: "冲突有层次和策略"
    characteristics:
      - "至少有两个层次的冲突同时存在"
      - "冲突的解决需要策略，不只是力量"
      - "有基本的代价（赢了但失去了什么）"
    counter_examples:
      - "四个层次都有涉及 → 应评7-8分"
  "7-8":
    label: "冲突多元且深刻"
    characteristics:
      - "四个层次的冲突都有涉及"
      - "冲突的解决揭示了新信息或深化了主题"
      - "每个冲突都有真正的赌注"
      - "典型表现：猎人（蚁王篇——内在冲突+人际冲突+宇宙冲突）"
    counter_examples:
      - "冲突推动角色成长和主题深化 → 应评9-10分"
  "9-10":
    label: "冲突是叙事的核心引擎"
    characteristics:
      - "冲突本身推动角色成长和主题深化"
      - "冲突的解决方式是'意料之外，情理之中'"
      - "典型表现：JOJO（替身战斗=策略博弈+角色意志力展示）"
    counter_examples:
      - "如果冲突只是'精彩'但不推动成长/主题 → 最高7-8分"

borderline_rules:
  - question: "战斗很精彩但没有策略，怎么评？"
    answer: |
      "精彩"的战斗不一定是好冲突。
      如果只是力量展示（更大的拳头、更快的速度）→ 3-4分。
      如果有策略性（利用环境、能力限制、心理博弈）→ 5-6分以上。
  - question: "冲突解决了但没有代价？"
    answer: |
      无代价的冲突是低分指标。
      如果冲突解决了但主角什么都没失去 → 最多5-6分。
      好的冲突：赢了但失去了什么（不可逆的代价）→ 7-8分。

positive_examples:
  - work: "JOJO"
    score: 9
    reason: |
      替身战斗 = 策略博弈 + 角色意志力展示。
      能力受限但创意十足（杀手皇后只能触碰引爆）。
      冲突推动角色成长。
  - work: "猎人"
    score: 8
    reason: |
      蚁王篇四个层次的冲突都有涉及。
      小杰的代价是真实的（牺牲自己的潜能）。

negative_examples:
  - work: "典型系统文"
    score: 2
    reason: |
      冲突 = 主角用系统碾压敌人。
      没有策略、没有代价、没有层次。

judge_prompt_addition: |
  特别注意以下几点：
  1. "精彩"不等于"好"——策略性比力量展示更重要
  2. "真正的代价"是7-8分的必要条件
  3. 多层次冲突（内在+人际+社会+宇宙）是7-8分的标志
  4. 冲突推动角色成长是9-10分的核心标准