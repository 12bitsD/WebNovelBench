dimension:
  id: "D9"
  name: "文化质感"
  name_en: "Cultural Texture"
  definition: |
    文化元素不是"贴皮"（换个名字就变成异世界）。
    文化质感 = 文化元素内化为叙事逻辑的一部分。
    
    文化元素的三个层次：
      Level 1: 装饰（名字、服饰、建筑）
      Level 2: 背景（影响角色行为和选择）
      Level 3: 骨架（驱动冲突、决定叙事逻辑）

sampling:
  strategy: "dispersed"
  chunk_size: 3000
  num_chunks: 8

scoring:
  "1-2":
    label: "无文化质感/纯架空"
    characteristics:
      - "世界是'默认奇幻'，没有任何独特的文化元素"
      - "或：有文化元素但是表面的（名字像但行为不像）"
    counter_examples:
      - "有文化设定但不影响情节 → 应评3-4分"
  "3-4":
    label: "文化作为背景"
    characteristics:
      - "有文化设定但不影响情节"
      - "文化元素是装饰性的（节日、服饰、建筑）"
    counter_examples:
      - "文化设定影响角色行为和选择 → 应评5-6分"
  "5-6":
    label: "文化影响情节"
    characteristics:
      - "文化设定影响角色的行为和选择"
      - "世界观的文化层面是自洽的"
    counter_examples:
      - "文化元素驱动冲突 → 应评7-8分"
  "7-8":
    label: "文化内化为叙事逻辑"
    characteristics:
      - "文化元素驱动冲突（不是装饰）"
      - "世界观的文化层面与力量体系/政治体系交织"
      - "文化元素有内在逻辑（不是随意堆砌）"
    counter_examples:
      - "删掉文化元素故事就不成立 → 应评9-10分"
  "9-10":
    label: "文化是叙事的骨架"
    characteristics:
      - "删掉文化元素，故事就不成立"
      - "文化元素本身产生叙事张力"
      - "典型表现：JOJO（音乐/艺术文化内化为命名和美学系统）"
    counter_examples:
      - "如果文化只是'很丰富'但不驱动故事 → 最高7-8分"

borderline_rules:
  - question: "文化元素很多但很散？"
    answer: |
      文化元素数量不是加分项，内化程度才是。
      100个文化符号 < 10个深度内化的文化元素。
  - question: "架空世界没有现实文化，怎么评？"
    answer: |
      架空世界也可以有文化质感——如果它有独特的文化体系。
      关键不是"有没有现实文化"，而是"文化是否内化为叙事逻辑"。

positive_examples:
  - work: "JOJO"
    score: 9
    reason: |
      音乐/艺术文化内化为命名系统和美学系统。
      文化元素不是装饰，而是叙事的一部分。
  - work: "绍宋"
    score: 8
    reason: |
      宋代文化深度内化——政治制度、军事体制、文人文化都影响情节。
      文化不是背景，而是冲突的来源。

negative_examples:
  - work: "典型穿越文"
    score: 2
    reason: |
      "穿越到古代"但文化元素只是表面的。
      角色的行为完全是现代人的思维方式。
      文化只是装饰，不影响情节。

judge_prompt_addition: |
  特别注意以下几点：
  1. 文化元素的"内化程度"比数量重要
  2. 架空世界也可以有文化质感
  3. 文化驱动冲突是7-8分的关键标准
  4. 考虑中文网文的类型特征——玄幻/仙侠有独特的文化内涵