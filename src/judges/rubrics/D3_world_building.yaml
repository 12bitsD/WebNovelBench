dimension:
  id: "D3"
  name: "世界观构建"
  name_en: "World Building"
  definition: |
    世界观不是"设定集"——它是一个"可能性空间"，决定了故事中什么事情可以发生。
    
    好的世界观：从少量基础规则推导出丰富的可能性。
    烂的世界观：大量零散设定，互相不关联，随时可以打破。
    
    评估重点：
    1. 系统性：设定之间是否有关联？
    2. 自洽性：规则是否始终被遵守？
    3. 展示方式：通过旁白还是行动展示？
    4. 叙事功能：世界观是否驱动冲突？

sampling:
  strategy: "dispersed"
  chunk_size: 3000
  num_chunks: 10

scoring:
  "1-2":
    label: "设定稀薄/随意"
    characteristics:
      - "世界是'默认奇幻世界'，没有独特设定"
      - "规则随时可以被打破（'反正作者说了算'）"
      - "设定通过大段旁白解释"
      - "存在Deus Ex Machina（突然出现新能力解决危机）"
    counter_examples:
      - "有独特设定但缺乏系统性 → 应评3-4分"
  "3-4":
    label: "有基本设定但不成体系"
    characteristics:
      - "有一些有趣的设定，但缺乏系统性"
      - "设定之间没有关联（力量体系和政治体系无关）"
      - "存在Deus Ex Machina（突然出现新能力解决危机）"
      - "设定通过旁白解释而非行动展示"
    counter_examples:
      - "核心规则清晰且始终被遵守 → 应评5-6分"
  "5-6":
    label: "有自洽的系统"
    characteristics:
      - "核心规则清晰，始终被遵守"
      - "有基本的推导关系（规则→后果）"
      - "设定通过行动展示，但深度一般"
      - "力量体系有基本的等级和限制"
    counter_examples:
      - "多个系统相互关联，限制产生叙事张力 → 应评7-8分"
  "7-8":
    label: "系统精密且有深度"
    characteristics:
      - "多个系统相互关联（力量体系↔政治体系↔经济体系）"
      - "规则有'天花板'，不无限膨胀"
      - "限制和代价产生叙事张力"
      - "世界观通过行动展示，读者自然理解规则"
      - "典型表现：凡人修仙传（修仙体系有清晰的等级和代价）"
    counter_examples:
      - "删掉世界观故事就不成立 → 应评9-10分"
  "9-10":
    label: "世界观是叙事的骨架"
    characteristics:
      - "删掉世界观，故事就不成立"
      - "规则的限制本身就是故事冲突的来源"
      - "世界观通过行动和后果展示，读者自然理解规则"
      - "典型表现：钢炼（等价交换）、诡秘之主（22途径体系）"
    counter_examples:
      - "如果世界观很宏大但不影响情节 → 最高5-6分"

borderline_rules:
  - question: "设定很多但很散，怎么评？"
    answer: |
      设定数量不是加分项，系统性才是。
      100个不相关的设定 < 10个相互关联的设定。
      关键看设定之间是否有逻辑推导关系。
  - question: "力量体系有等级但不断加新等级，怎么评？"
    answer: |
      这是"力量膨胀"，负面指标。
      好的力量体系有明确的天花板。
      不断加新等级 = 作者没有规划 = 扣分。
      具体扣多少：如果膨胀严重（后期等级远超前期规划）→ 从7-8降到5-6。
  - question: "世界观通过旁白解释但很精彩，怎么评？"
    answer: |
      "展示而非讲述"是独立维度（D7），不影响世界观本身的评分。
      但如果世界观完全通过旁白解释且没有任何行动展示 → 在D3中扣1分。
      因为好的世界观应该能通过行动展示。
  - question: "世界观很独特但有逻辑漏洞？"
    answer: |
      独特性是加分项（最多+1），但逻辑漏洞是减分项（每个漏洞-1）。
      如果漏洞严重（违反核心规则）→ 大幅扣分。
      如果漏洞轻微（边缘情况）→ 小幅扣分。

positive_examples:
  - work: "钢炼"
    score: 10
    reason: |
      "等价交换"一条规则推导出整个炼金术体系。
      删掉世界观，故事不成立。
      规则的限制（不能炼金人体、必须理解成分）直接驱动冲突。
  - work: "诡秘之主"
    score: 9
    reason: |
      22条途径 × 10个序列 = 220种能力位置，系统性极强。
      每个位置有明确的能力、限制、代价。
      力量体系与政治体系、社会结构深度关联。
  - work: "JOJO"
    score: 7
    reason: |
      替身能力系统创意十足，每个替身有独特的能力和限制。
      限制创造精彩的战斗（不是比谁更强，而是比谁更聪明）。
      但不同部之间的世界观关联较弱。

negative_examples:
  - work: "斗破苍穹"
    score: 3
    reason: |
      斗气等级体系看起来有系统性，但后期不断加新等级（斗帝之上还有什么？）。
      力量膨胀严重，规则不断被打破。
      世界观对情节的影响有限（主要是"打怪升级"的背景）。
  - work: "典型系统文"
    score: 2
    reason: |
      "系统"本身就是Deus Ex Machina——想要什么就给什么。
      没有规则限制，没有代价。
      世界观是零散的设定堆砌。

judge_prompt_addition: |
  特别注意以下几点：
  1. 系统性比数量重要——10个关联设定 > 100个散乱设定
  2. 力量膨胀是严重负面指标
  3. 世界观的"叙事功能"——是否驱动冲突——是高分的关键
  4. 旁白解释不是绝对负面，但如果完全靠旁白 → 扣分
  5. 设定的独特性是加分项，但不能掩盖逻辑漏洞