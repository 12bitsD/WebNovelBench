dimension:
  id: "D7"
  name: "展示艺术"
  name_en: "Show Don't Tell"
  definition: |
    "Show, don't tell"的本质：
    通过行动、对话、细节让读者自己得出结论，
    而不是通过旁白告诉读者应该得出什么结论。
    
    展示 vs 讲述的具体区别：
      讲述："他很愤怒。"（旁白告诉读者）
      展示："他猛地站起来，椅子向后翻倒。他的手攥成拳头，指节发白。"（行动让读者自己判断）

sampling:
  strategy: "continuous"
  start_pct: 0.2
  num_chapters: 5
  chunk_size: 3000

scoring:
  "1-2":
    label: "纯旁白叙事"
    characteristics:
      - "一切通过旁白解释（'他很愤怒'、'这个世界很残酷'）"
      - "角色的情感通过旁白标注而非行动展示"
      - "世界观通过'设定文档'式的旁白解释"
      - "角色的内心独白重复了行动已经展示的内容"
    counter_examples:
      - "偶尔通过行动展示 → 应评3-4分"
  "3-4":
    label: "有展示但不一致"
    characteristics:
      - "偶尔通过行动展示，但经常回退到旁白解释"
      - "角色的内心独白重复了行动已经展示的内容"
      - "典型表现：'他紧握拳头（展示）。他非常愤怒（讲述）。'"
    counter_examples:
      - "大部分通过行动和对话展示 → 应评5-6分"
  "5-6":
    label: "展示为主，讲述为辅"
    characteristics:
      - "大部分通过行动和对话展示"
      - "偶尔需要旁白解释复杂的世界观设定"
      - "情感主要通过行动展示"
    counter_examples:
      - "对话揭示性格，行动展示情感，细节传达氛围 → 应评7-8分"
  "7-8":
    label: "展示精湛"
    characteristics:
      - "对话揭示性格，行动展示情感，细节传达氛围"
      - "世界观通过角色的行动和后果自然展示"
      - "读者通过积累细节自己得出结论"
    counter_examples:
      - "删掉所有旁白读者仍然能理解 → 应评9-10分"
  "9-10":
    label: "展示即叙事"
    characteristics:
      - "删掉所有旁白，读者仍然能理解故事"
      - "每个细节都有叙事功能"
      - "典型表现：JOJO的视觉化叙事（用动作而非旁白传递信息）"
    counter_examples:
      - "如果偶尔需要旁白解释 → 最高7-8分"

borderline_rules:
  - question: "内心独白是讲述吗？"
    answer: |
      不一定。内心独白可以是展示——如果它揭示了角色的真实想法。
      但如果内心独白重复了行动已经展示的内容 → 是讲述，扣分。
      好的内心独白：揭示行动没有展示的内心冲突。
      烂的内心独白："我很愤怒"（行动已经展示了愤怒）。
  - question: "世界观必须通过行动展示吗？"
    answer: |
      不一定。复杂的世界观可能需要少量旁白解释。
      但如果超过30%的世界观是通过旁白解释的 → 扣分。
      好的做法：通过角色的行动和后果展示世界观。

positive_examples:
  - work: "JOJO"
    score: 9
    reason: |
      视觉化叙事——用动作而非旁白传递信息。
      替身战斗通过行动展示能力，而非旁白解释。
  - work: "钢炼"
    score: 8
    reason: |
      等价交换通过角色的行动和后果展示。
      角色的情感通过行动展示（爱德华的矮个子焦虑通过行动而非旁白）。

negative_examples:
  - work: "典型网文"
    score: 2
    reason: |
      大段旁白解释世界观。
      角色的情感通过旁白标注："他感到一阵愤怒。"
      内心独白重复行动已经展示的内容。

judge_prompt_addition: |
  特别注意以下几点：
  1. 内心独白不一定是讲述——如果揭示了行动没有展示的内容
  2. 世界观需要少量旁白是可以接受的（不超过30%）
  3. "每个细节都有叙事功能"是9-10分的核心标准
  4. 考虑网文的连载约束——日更模式下展示比讲述更难