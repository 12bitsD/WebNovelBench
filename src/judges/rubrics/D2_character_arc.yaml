dimension:
  id: "D2"
  name: "角色弧光"
  name_en: "Character Arc"
  definition: |
    角色弧光 = 角色从故事开始到结束的变化轨迹。
    好的弧光不是"变强了"，而是"在压力下做出选择，选择导致不可逆的变化"。
    
    角色弧光的因果链：
      初始状态（establishing）→ 读者形成预期
      压力/冲突（complication）→ 预期受到挑战
      关键选择（crisis）→ 角色在压力下做出决定
      转变（transformation）→ 决定导致不可逆的变化
      新状态（resolution）→ 读者理解变化的意义
    
    关键判断：变化是"故事驱动"还是"作者强行"？

sampling:
  strategy: "key_nodes"
  chunk_size: 3000

scoring:
  "1-2":
    label: "扁平角色/工具人"
    characteristics:
      - "角色从头到尾没有变化"
      - "角色没有独立动机，只是服务于情节的功能"
      - "去掉名字无法区分不同角色"
      - "配角完全没有独立人格，只是'功能性角色'"
    counter_examples:
      - "角色信念不变但理解深化 → 应评7-8分（扁平弧光/信念型）"
  "3-4":
    label: "有变化但不自然"
    characteristics:
      - "角色有变化，但变化缺乏铺垫（'突然顿悟'）"
      - "变化是线性的（一直变好或一直变坏），没有内心挣扎"
      - "配角完全没有弧光"
      - "典型表现：主角'升级'式的成长（打怪→变强→打更强的怪）"
    counter_examples:
      - "变化有事件驱动，有因果链 → 应评5-6分"
  "5-6":
    label: "有合理弧光，但深度一般"
    characteristics:
      - "变化有事件驱动，有因果链"
      - "有基本的内心冲突（想做A但不得不做B）"
      - "至少1-2个配角有独立弧光"
      - "典型表现：类型小说中角色塑造较好的作品"
    counter_examples:
      - "角色核心冲突与故事主题直接相关 → 应评7-8分"
  "7-8":
    label: "弧光深刻且与主题耦合"
    characteristics:
      - "角色的核心冲突与故事主题直接相关"
      - "变化是渐进的、有层次的（不是一次性转变）"
      - "多个主要角色有独立弧光"
      - "弧光类型多样（正向/负向/扁平/颠覆）"
      - "典型表现：死亡笔记（夜神月的渐进堕落）"
    counter_examples:
      - "弧光是故事的核心驱动力，删掉就不成立 → 应评9-10分"
  "9-10":
    label: "弧光是故事的核心驱动力"
    characteristics:
      - "角色的变化就是故事本身"
      - "删掉角色弧光，故事就不成立"
      - "弧光深刻到读者能在角色身上看到自己"
      - "典型表现：钢炼（爱德华对'等价交换'的理解就是整个故事）"
    counter_examples:
      - "如果只是主角有弧光但配角都是工具人 → 最高7-8分"

borderline_rules:
  - question: "主角没变但配角变了，怎么评？"
    answer: |
      主角的"扁平弧光"（信念型）如果处理得好，可以是高分。
      例：JOJO的空条承太郎——信念不变但理解深化。
      关键看"不变"是否也是一种有意义的选择。
      如果"不变"是有意识的选择且有代价 → 高分
      如果"不变"只是作者没写 → 低分
  - question: "角色变化太快（一章就转变），算不算？"
    answer: |
      快速转变本身不是问题，关键是是否有足够的铺垫。
      如果铺垫充分（前文有大量暗示），一章转变可以是高分。
      如果没有铺垫，直接扣分到3-4分。
  - question: "反派的弧光怎么评估？"
    answer: |
      反派的弧光是独立评估项。
      好的反派有自己的动机和弧光（莱纳在进击的巨人中）。
      烂的反派是纯粹的"邪恶存在"，没有动机。
      反派有弧光是加分项（在7-8分及以上考虑）。
  - question: "多个主角弧光质量不一致？"
    answer: |
      取主要角色弧光的平均质量。
      如果主角弧光很好但配角都是工具人 → 受配角拖累降到5-6分。
      如果主角和主要配角都有弧光 → 7-8分的基础。

positive_examples:
  - work: "钢炼"
    score: 9
    reason: |
      爱德华的弧光 = 整个故事。
      从"我要拿回弟弟的身体"到"等价交换不是万能的"——
      这个变化是渐进的、有事件驱动的、与主题完美耦合的。
      配角（马斯·休斯、大哥哥、人造人们）也都有独立弧光。
  - work: "进击的巨人"
    score: 9
    reason: |
      艾伦的弧光是"自由的代价"——
      从"要杀光所有巨人"到"我是那个恶魔"。
      莱纳的双重人格、三笠的独立思考——配角弧光也很深。
  - work: "死亡笔记"
    score: 8
    reason: |
      夜神月的堕落是渐进的——从"改变世界的理想主义者"到"自认为神的独裁者"。
      每一步都"合理"，但整体是不可逆的堕落。

negative_examples:
  - work: "典型系统文"
    score: 2
    reason: |
      主角除了变强没有任何变化。
      动机从头到尾就是"变强"。
      配角是功能性角色（提供信息、提供帮助）。
  - work: "典型后宫文"
    score: 2
    reason: |
      主角是"好人"但没有弧光。
      配角（后宫成员）各自有设定但没有成长。
  - work: "斗破苍穹"
    score: 4
    reason: |
      萧炎有变化（从废柴到强者），但变化是线性的"升级"。
      缺少内心冲突——他从不怀疑自己是否应该变强。
      配角基本是工具人。

judge_prompt_addition: |
  特别注意以下几点：
  1. "扁平弧光"（信念型）不是低分——如果"不变"是有意义的选择
  2. 变化的"驱动方式"比变化本身更重要（故事驱动 vs 作者强行）
  3. 反派的弧光是独立评估项，好的反派有自己的动机
  4. 配角弧光是7-8分的必要条件
  5. 弧光与主题的耦合度是区分5-6和7-8的关键