dimension:
  id: "D5"
  name: "结构张力"
  name_en: "Structure & Tension"
  definition: |
    故事的"好看"本质上是张力的管理——
    什么时候紧张，什么时候释放，什么时候反转。
    
    张力管理的因果链：
      稳态（equilibrium）→ 读者舒适
      扰动（disruption）→ 舒适被打破 → 张力上升
      升温（escalation）→ 问题越来越严重 → 张力持续上升
      危机（crisis）→ 到达临界点 → 张力最高
      转折（turning point）→ 方向改变 → 张力释放或重构
      新稳态 → 但比之前更高一层 → 为下一轮张力蓄力

sampling:
  strategy: "continuous"
  start_pct: 0.3
  num_chapters: 5
  chunk_size: 3000

scoring:
  "1-2":
    label: "无张力/节奏平坦"
    characteristics:
      - "故事是事件的线性排列"
      - "没有冲突升级（后面的冲突不比前面更有挑战）"
      - "没有真正的代价（主角总能化险为夷）"
    counter_examples:
      - "有冲突但节奏单一 → 应评3-4分"
  "3-4":
    label: "有基本张力但单调"
    characteristics:
      - "有冲突但节奏单一（一直在高潮或一直在平淡）"
      - "冲突是重复的（同一类型的冲突反复出现）"
      - "代价是假的（看似有损失但很快就恢复）"
    counter_examples:
      - "高潮和缓冲有交替 → 应评5-6分"
  "5-6":
    label: "有合理节奏"
    characteristics:
      - "高潮和缓冲有交替"
      - "冲突有基本的升级（赌注在增加）"
      - "有至少一次'真正的代价'（不可逆的损失）"
    counter_examples:
      - "多层次波动叠加 → 应评7-8分"
  "7-8":
    label: "多层次张力管理"
    characteristics:
      - "章节级小波动 + 卷级中波动 + 全局大波动"
      - "冲突在多个维度升级（赌注、复杂度、代价）"
      - "节奏本身传达情感（紧张段落的节奏让人紧张）"
    counter_examples:
      - "张力曲线本身成为叙事的一部分 → 应评9-10分"
  "9-10":
    label: "张力是叙事的核心引擎"
    characteristics:
      - "张力曲线本身成为叙事的一部分"
      - "读者能感受到作者对节奏的精确控制"
      - "每个'释放'都是为了下一个更高的'紧张'"
      - "典型表现：进击的巨人（每一季的张力都在递进）"
    counter_examples:
      - "如果只是'一直在高潮' → 最多5-6分（单调）"

borderline_rules:
  - question: "一直在高潮，很刺激，是高分吗？"
    answer: |
      不是。"一直在高潮" = 节奏单调 = 最多5-6分。
      好的节奏需要张弛有度——高潮需要缓冲来衬托。
      如果读者一直处于高刺激状态，会疲劳。
  - question: "有真正的代价但节奏平淡，怎么评？"
    answer: |
      "真正的代价"是加分项（+1），但节奏平淡是减分项。
      如果有代价但节奏平淡 → 最高5-6分。
      如果有代价且节奏好 → 7-8分。
  - question: "前期节奏好但后期崩坏？"
    answer: |
      取整体评估。如果后期崩坏严重 → 大幅扣分。
      "烂尾"是独立的负面指标。

positive_examples:
  - work: "进击的巨人"
    score: 9
    reason: |
      每一季的张力都在递进。
      墙内生存→墙外真相→马莱视角→地鸣——赌注持续升级。
      节奏精确：紧张段落让人窒息，缓冲段落让人思考。
  - work: "钢炼"
    score: 8
    reason: |
      节奏控制精准——幽默和严肃的切换自然。
      冲突在多个维度升级（个人→团队→世界）。
      有真正的代价（马斯·休斯的死亡）。

negative_examples:
  - work: "典型玄幻文"
    score: 3
    reason: |
      冲突是重复的（遇到敌人→打不过→变强→打败敌人）。
      没有真正的代价——主角总能化险为夷。
      节奏单调——一直在"战斗-升级"循环。

judge_prompt_addition: |
  特别注意以下几点：
  1. "一直在高潮"是负面指标——好的节奏需要张弛有度
  2. "真正的代价"（不可逆的损失）是7-8分的关键特征
  3. 多层次波动（章节级+卷级+全局）是7-8分的标志
  4. 考虑网文的连载约束——日更模式下节奏控制更难