dimension:
  id: "D1"
  name: "信息流管理"
  name_en: "Information Flow Management"
  definition: |
    故事本质上是一台信息管理机器。
    作者控制"读者知道什么"和"读者不知道什么"之间的差距，
    用这个差距驱动好奇心、惊讶、重新理解等阅读体验。
    好的信息流 = 精密地控制读者的认知状态。

sampling:
  strategy: "dispersed"
  chunk_size: 3000
  num_chunks: 10
  description: |
    分散采样：每10%的文本取一个3000字片段。
    覆盖故事的开头、发展、转折、高潮、结尾。

scoring:
  "1-2":
    label: "信息线性释放"
    characteristics:
      - "信息按时间顺序平铺，无悬念管理"
      - "读者从头到尾知道的和角色一样多"
      - "无伏笔，无信息缺口"
      - "典型表现：旁白式叙事，'然后...然后...然后...'"
    counter_examples:
      - "有简单悬念但管理粗糙 → 应评3-4分"
  "3-4":
    label: "有基础悬念但管理粗糙"
    characteristics:
      - "有简单的悬念（'他能打败敌人吗？'）"
      - "有伏笔但回收率低（<50%），或回收方式平淡"
      - "信息释放节奏单一（一直慢或一直快）"
      - "典型表现：套路化的'黄金三章'悬念，后续悬念管理松散"
    counter_examples:
      - "伏笔系统化且回收率高 → 应评5-6分"
  "5-6":
    label: "有系统化的信息管理"
    characteristics:
      - "有明确的伏笔-回收系统，回收率>70%"
      - "信息释放有节奏变化（紧张→释放→再紧张）"
      - "至少有1-2个'揭示改变了读者理解'的时刻"
      - "典型表现：类型小说中信息管理较好的作品"
    counter_examples:
      - "揭示只是解答问题，没有提出新问题 → 仍是5-6分"
      - "揭示同时解答旧问题+提出新问题 → 应评7-8分"
  "7-8":
    label: "信息级联精密"
    characteristics:
      - "每次揭示同时解答旧问题+提出新问题（信息级联）"
      - "多条信息线交织，相互影响"
      - "读者不断被'重新定位'——以为自己理解了，但揭示了新层面"
      - "典型表现：进击的巨人（墙外真相→马莱→地鸣的级联）"
    counter_examples:
      - "级联但没有改变整个理解框架 → 仍是7-8分"
      - "揭示改变了整个故事的理解框架 → 应评9-10分"
  "9-10":
    label: "叙事重构级别"
    characteristics:
      - "揭示改变了整个故事的理解框架"
      - "读者需要从头重新理解之前的所有内容"
      - "信息管理系统本身就是叙事的核心驱动力"
      - "典型表现：进击的巨人马莱篇、道诡异仙"
    counter_examples:
      - "如果只是'原来XX是YY' → 级联（7-8分），不是重构"
      - "必须是'原来整个故事不是我以为的那样'才是重构"

borderline_rules:
  - question: "伏笔回收了但方式平淡，算不算？"
    answer: |
      回收本身算+1，但平淡的回收不加分。
      "回收方式"单独评估：是否出乎意料、是否改变了理解。
      如果回收方式出乎意料且改变了理解 → 高分。
      如果回收方式平淡（只是"原来如此"）→ 中等分数。
  - question: "信息级联和叙事重构怎么区分？"
    answer: |
      级联 = 新问题替代旧问题（认知被更新）
      重构 = 整个理解框架被推翻（认知被颠覆）
      如果只是"原来XX是YY" → 级联（7-8分）
      如果是"原来整个故事不是我以为的那样" → 重构（9-10分）
  - question: "悬念很多但都没解决，怎么评？"
    answer: |
      未解决的悬念是负面指标。
      张力曲线应该有解决周期，不是一直升高。
      如果提出的问题远多于解决的问题 → 扣分（挖坑不填）。
      好的信息管理：提出问题→解决问题→提出新问题的循环。
  - question: "伏笔密度高但回收率低，怎么评？"
    answer: |
      伏笔密度高本身不是加分项。
      关键是回收率和回收质量。
      100个伏笔回收了30个 < 10个伏笔回收了9个。
      回收率 > 70% 是5-6分的门槛。

positive_examples:
  - work: "进击的巨人"
    score: 8
    reason: |
      马莱篇的视角反转，信息级联精密。
      每次揭示同时解答旧问题+提出新问题。
      但未达到9-10分的'叙事重构'级别，
      因为虽然改变了视角，但核心故事线（艾伦的自由）是一致的。
  - work: "诡秘之主"
    score: 8
    reason: |
      22途径体系的信息管理非常精密。
      克莱恩的身份揭示是信息级联的典范。
      但未达到9-10分，因为没有彻底改变对整个故事的理解。
  - work: "道诡异仙"
    score: 9
    reason: |
      叙事欺骗达到极致——读者发现'现实'可能只是另一层幻觉。
      这是真正的叙事重构：读者需要从头重新理解整个故事。

negative_examples:
  - work: "典型系统文"
    score: 2
    reason: |
      信息线性释放，无悬念管理。
      主角获得系统→升级→获得更强系统→再升级。
      信息是单调递增的，没有缺口、没有揭示、没有级联。
  - work: "典型签到文"
    score: 1
    reason: |
      无信息管理。
      每天签到→获得奖励→变强→继续签到。
      读者从第一章就知道后续发展。
  - work: "斗破苍穹（后期）"
    score: 3
    reason: |
      前期有不错的悬念管理（三年之约），
      但后期信息管理崩坏——不断引入新势力、新等级、新危机，
      但缺乏系统性的伏笔-回收循环。

judge_prompt_addition: |
  特别注意以下几点：
  1. 伏笔回收率是关键指标，但回收质量同样重要
  2. 信息级联（揭示同时解答+提出新问题）是7-8分的核心特征
  3. 叙事重构（整个理解框架被推翻）是9-10分的核心特征
  4. 挖坑不填是负面指标，要扣分
  5. 考虑作品的类型特征——不同类型的信息管理标准不同
