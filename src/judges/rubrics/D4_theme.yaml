dimension:
  id: "D4"
  name: "主题共振"
  name_en: "Thematic Resonance"
  definition: |
    主题不是"故事告诉读者什么道理"——主题是"故事的结构本身在说什么"。
    
    因果链：
      控制思想（controlling idea）→ 故事的核心论点
      二元对立（opposition）→ 控制思想的对立面
      辩证展开（dialectic）→ 两个对立面在故事中碰撞
      综合（synthesis）→ 故事结尾的立场（但好的故事不简单站队）
    
    关键区分：
      烂的主题表达：角色说教（"我明白了，原来XX是YY"）
      好的主题表达：结构即主题（删掉任何一部分，主题都不完整）

sampling:
  strategy: "key_nodes"
  chunk_size: 3000

scoring:
  "1-2":
    label: "无主题/纯娱乐"
    characteristics:
      - "故事只有事件，没有意义层面"
      - "不存在可以讨论的深层含义"
      - "读者读完后没有可以思考的东西"
    counter_examples:
      - "有简单主题但处理粗糙 → 应评3-4分"
  "3-4":
    label: "有简单主题但处理粗糙"
    characteristics:
      - "善恶对立、正义必胜"
      - "主题通过角色嘴巴直接说出来"
      - "典型表现：'这个世界需要爱和和平'"
      - "没有对立面的碰撞"
    counter_examples:
      - "主题通过情节展示而非说教 → 应评5-6分"
  "5-6":
    label: "有主题且基本表达合理"
    characteristics:
      - "有明确的控制思想"
      - "主题通过情节展示，但偶尔有说教"
      - "有基本的对立面（正方vs反方的观点都有合理性）"
      - "主题从头到尾存在"
    counter_examples:
      - "主题有多层含义且不说教 → 应评7-8分"
  "7-8":
    label: "主题深刻且表达自然"
    characteristics:
      - "主题有多层含义"
      - "主题通过结构展示（不说教）"
      - "角色的核心冲突与主题直接相关"
      - "读者需要思考才能理解主题的全部含义"
      - "有对立主题的碰撞（如：自由vs安全）"
    counter_examples:
      - "主题与结构完美统一 → 应评9-10分"
  "9-10":
    label: "主题与结构完美统一"
    characteristics:
      - "删掉任何一部分，主题都不完整"
      - "主题从第一页就存在，贯穿到结尾"
      - "主题是开放的，不同读者可以有不同的理解"
      - "典型表现：钢炼（等价交换=力量体系=哲学主题=角色弧光）"
    counter_examples:
      - "如果主题很深但只在结尾出现 → 最高7-8分"

borderline_rules:
  - question: "故事很感人但没有明确主题，怎么评？"
    answer: |
      "感人"不是主题。感人是效果，主题是意义。
      如果感人但没有可讨论的深层含义 → 主题维度分数低（3-4分）。
      但"感人"本身可能在D10（爽点工艺）中加分。
  - question: "主题是'自由'，但没有深入讨论，怎么评？"
    answer: |
      主题的名字不是关键，关键是否被深入讨论。
      如果只是表面提到了"自由"但没有深入 → 5-6分。
      如果深入讨论了"自由"的多个层面（自由的代价、自由的边界）→ 7-8分。
  - question: "角色直接说出主题，一定是低分吗？"
    answer: |
      不一定。关键是"说出"的时机和方式。
      如果角色在故事早期就说教 → 扣分。
      如果角色在经历一切后自然得出结论 → 不扣分。
      但如果主题完全依赖角色嘴巴说出来，而故事结构本身不支持 → 扣分。

positive_examples:
  - work: "钢炼"
    score: 10
    reason: |
      "等价交换"既是力量体系也是哲学主题。
      删掉任何一部分，主题都不完整。
      主题从第一页贯穿到最后，且有多层含义。
  - work: "进击的巨人"
    score: 8
    reason: |
      "自由的代价"是核心主题，通过艾伦的弧光展示。
      有对立主题的碰撞（自由vs安全、正义vs复仇）。
      但部分说教段落（角色直接讨论主题）拉低了分数。
  - work: "死亡笔记"
    score: 8
    reason: |
      "权力腐蚀"和"正义的边界"通过夜神月的堕落展示。
      不说教——读者通过观察夜神月的变化自己得出结论。

negative_examples:
  - work: "典型系统文"
    score: 1
    reason: |
      没有可讨论的主题。
      故事就是"变强→更强→最强"。
  - work: "典型爽文"
    score: 2
    reason: |
      表面主题是"正义必胜"，但没有深入讨论。
      主题通过"好人赢了"来表达，而非通过结构。

judge_prompt_addition: |
  特别注意以下几点：
  1. "感人"不是主题——感人是效果，主题是意义
  2. 角色说教不一定是低分——看时机和方式
  3. 主题的"结构统一性"是9-10分的核心标准
  4. 对立主题的碰撞是7-8分的关键特征
  5. 考虑作品类型——不同类型的主题深度标准不同