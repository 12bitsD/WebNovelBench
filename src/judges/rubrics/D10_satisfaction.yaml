dimension:
  id: "D10"
  name: "爽点工艺"
  name_en: "Satisfaction Craft"
  definition: |
    爽点 = 读者预期被满足或被超越的瞬间。
    好的爽点：过程有创意，满足有层次。
    烂的爽点：纯力量碾压，无过程。
    
    爽点的因果链：
      预期建立（读者知道主角会赢）→ 期待
      过程展示（怎么赢）→ 悬念
      满足/超越（赢了，但方式出乎意料）→ 爽感
    
    爽点的四个层次：
      Level 1: 主角变强了（低满足）
      Level 2: 主角赢了（中满足）
      Level 3: 赢的方式揭示了新信息（高满足）
      Level 4: 赢改变了故事走向（极高满足）

sampling:
  strategy: "key_nodes"
  chunk_size: 3000

scoring:
  "1-2":
    label: "无爽点/纯力量展示"
    characteristics:
      - "主角赢了但过程无聊（'一拳秒杀'）"
      - "爽点是重复的（每次都是同样的套路）"
    counter_examples:
      - "有爽点但套路化 → 应评3-4分"
  "3-4":
    label: "有爽点但套路化"
    characteristics:
      - "爽点是'废柴逆袭'的模板"
      - "过程是可预测的（读者知道主角会赢）"
      - "满足感单一（只是'赢了'）"
    counter_examples:
      - "赢的方式有策略性 → 应评5-6分"
  "5-6":
    label: "爽点有基本创意"
    characteristics:
      - "赢的方式有策略性"
      - "过程有悬念（不确定怎么赢）"
      - "满足感有层次（赢了+揭示了新信息）"
    counter_examples:
      - "赢的方式出乎意料但合理 → 应评7-8分"
  "7-8":
    label: "爽点精湛"
    characteristics:
      - "赢的方式出乎意料但合理"
      - "满足感多层次（赢+揭示+情感冲击）"
      - "爽点本身推动了情节"
      - "典型表现：JOJO（战斗的创意性）、诡秘之主（信息差碾压）"
    counter_examples:
      - "爽点深化了主题 → 应评9-10分"
  "9-10":
    label: "爽点是叙事的一部分"
    characteristics:
      - "删掉爽点，故事就不完整"
      - "爽点深化了主题"
      - "典型表现：钢炼（爱德华的每一次炼金术使用都深化'等价交换'主题）"
    counter_examples:
      - "如果爽点只是'精彩'但不深化主题 → 最高7-8分"

borderline_rules:
  - question: "爽点很多但重复，怎么评？"
    answer: |
      数量不是加分项，质量和多样性才是。
      如果爽点是重复的（每次都是同样的套路）→ 最多3-4分。
      好的爽点：每次都有不同的创意和层次。
  - question: "爽点很爽但破坏了故事逻辑？"
    answer: |
      如果爽点是通过Deus Ex Machina实现的 → 扣分。
      爽点必须在故事逻辑内——"意料之外，情理之中"。
      如果爽点破坏了故事逻辑 → 从高分降到低分。

positive_examples:
  - work: "JOJO"
    score: 8
    reason: |
      战斗的创意性——替身能力受限但使用方式出乎意料。
      满足感多层次（赢了+策略精彩+角色意志力展示）。
  - work: "诡秘之主"
    score: 8
    reason: |
      信息差碾压——主角利用知识优势获胜。
      爽点推动情节（每次胜利都揭示新信息）。

negative_examples:
  - work: "典型系统文"
    score: 2
    reason: |
      爽点 = 系统给奖励→秒杀。
      没有过程，没有创意，没有层次。
  - work: "典型龙傲天"
    score: 1
    reason: |
      主角从头到尾碾压。
      没有任何悬念——读者知道主角一定会赢。

judge_prompt_addition: |
  特别注意以下几点：
  1. 爽点的"创意性"比"爽度"重要
  2. 重复的爽点是负面指标
  3. 爽点推动情节是7-8分的关键特征
  4. 爽点深化主题是9-10分的核心标准
  5. Deus Ex Machina式的爽点要大幅扣分